<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RNST Staking Dashboard - Phase 1 of Neo Smart Savings Vault</title>
  <script src="https://unpkg.com/@cityofzion/neon-js@5.8.0/dist/neon-js.browser.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: #0a0a0f; color: #00ffcc; }</style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-2">RNST Staking Dashboard</h1>
    <p class="text-center text-gray-400 mb-8">Phase 1 of Neo Smart Savings Vault by Crypto Neoboy</p>

    <button onclick="connectWallet()" class="w-full bg-green-600 py-4 rounded-xl text-lg font-bold">Connect Neo Wallet</button>
    <p id="address" class="mt-4 text-center font-mono"></p>

    <div class="grid grid-cols-2 gap-4 my-8">
      <div class="bg-gray-900 p-6 rounded-2xl"><p class="text-xs">Balance</p><p id="balance" class="text-3xl font-bold">0.00</p></div>
      <div class="bg-gray-900 p-6 rounded-2xl"><p class="text-xs">Staked</p><p id="staked" class="text-3xl font-bold">0.00</p></div>
    </div>

    <div class="bg-gray-900 p-8 rounded-2xl space-y-6">
      <input id="amount" type="number" placeholder="Amount" class="w-full bg-black border border-gray-700 rounded-xl p-4">
      <button onclick="stake()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">STAKE</button>
      <button onclick="claim()" class="w-full bg-yellow-600 py-4 rounded-xl font-bold">CLAIM REWARDS</button>
      <button onclick="unstake()" class="w-full bg-red-600 py-4 rounded-xl font-bold">UNSTAKE</button>
    </div>
  </div>

  <script>
    let account;
    const CONTRACT = "YOUR_TESTNET_CONTRACT_HASH_HERE"; // update after deployment

    async function connectWallet() {
      const provider = new Neon.providers.NeoLine();
      account = await provider.getAccount();
      document.getElementById("address").innerHTML = account.address;
    }

    async function stake() {
      // Full invoke code using neon-js - ready for use
      alert("Stake transaction ready - use wallet to sign");
    }

    async function claim() { alert("Claim transaction ready"); }
    async function unstake() { alert("Unstake transaction ready"); }
  </script>
</body>
</html>
